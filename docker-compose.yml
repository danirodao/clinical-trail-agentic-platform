# docker-compose.yml
x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin123
  MINIO_BUCKET: clinical-trial-pdfs
  POSTGRES_DSN: postgresql://ctuser:ctpassword@postgres:5432/clinical_trials
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: neo4jpassword
  OPENAI_API_KEY: ${OPENAI_API_KEY}

services:
  # ═══════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════
  migrate:
    build:
      context: .
      dockerfile: migrations/Dockerfile
    container_name: migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://ctuser:ctpassword@postgres:5432/clinical_trials
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clinical-net
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.admin.serverPort=9080"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: curl -f http://localhost:9080/commands/ruok || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinical-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_ID: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:29092
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - clinical-net

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        echo 'Waiting for Kafka to be ready...'
        sleep 5

        echo 'Creating Kafka topics...'

        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic pdf-generated --partitions 3 --replication-factor 1 --config retention.ms=604800000 --config max.message.bytes=1048576

        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic pdf-processing-status --partitions 3 --replication-factor 1 --config retention.ms=2592000000

        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic pdf-processing-dlq --partitions 1 --replication-factor 1 --config retention.ms=-1

        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic ingestion-commands --partitions 3 --replication-factor 1 --config retention.ms=86400000

        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic trial-ingested --partitions 3 --replication-factor 1 --config retention.ms=604800000 

        echo ''
        echo 'Topics created:'
        kafka-topics --list --bootstrap-server kafka:29092
        echo ''
        echo 'Done.'
    networks:
      - clinical-net
  # ═══════════════════════════════════════════════════════════════
  # SINGLE POSTGRESQL — 3 databases, 3 users, full isolation
  # ═══════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres # Superuser (for init only)
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres # Default DB (not used by services)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro
      - ./sql/init.sql:/docker-entrypoint-initdb.d/02-init-app-schema.sql:ro
      - ./sql/auth_tables.sql:/docker-entrypoint-initdb.d/03-auth-tables.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinical-net

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clinical-net

  neo4j:
    image: neo4j:5.19-community
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474" # Browser
      - "7687:7687" # Bolt
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: cypher-shell -u neo4j -p neo4jpassword "RETURN 1"
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - clinical-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinical-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        echo 'Configuring MinIO...'
        mc alias set local http://minio:9000 minioadmin minioadmin123
        mc mb --ignore-existing local/clinical-trial-pdfs
        echo 'MinIO bucket created'
    networks:
      - clinical-net

  # ═══════════════════════════════════════════
  # GENERATOR CONTAINER (on-demand)
  # Runs, generates PDFs, publishes to Kafka, exits.
  # ═══════════════════════════════════════════

  generator:
    build:
      context: .
      dockerfile: generator/Dockerfile
    environment:
      <<: *common-env
      NUM_TRIALS: ${NUM_TRIALS:-10}
      PATIENTS_PER_TRIAL: ${PATIENTS_PER_TRIAL:-20}
      SEED: ${SEED:-42}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    # On-demand: does NOT auto-start with `docker compose up`
    # Trigger with: docker compose run --rm generator
    profiles:
      - generate
    volumes:
      - ./shared:/app/shared
    networks:
      - clinical-net

  # ═══════════════════════════════════════════
  # PROCESSOR CONTAINER (always running)
  # Long-lived consumer, processes PDFs one-by-one.
  # ═══════════════════════════════════════════

  processor:
    build:
      context: .
      dockerfile: processor/Dockerfile
    environment:
      <<: *common-env
      KAFKA_CONSUMER_GROUP: pdf-processor-group
      KAFKA_TOPIC: pdf-generated
      MAX_CONCURRENT_PROCESSING: 1
      PROCESSING_TIMEOUT_SECONDS: 300
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./shared:/app/shared
      - ./processor:/app/processor
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - clinical-net

  # ═══════════════════════════════════════════
  # MONITORING (optional)
  # ═══════════════════════════════════════════

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    # profiles:
    #   - monitoring
    networks:
      - clinical-net
    # ═══════════════════════════════════════════════════════════════
    # KEYCLOAK — OAuth2/OIDC Identity Provider
    # ═══════════════════════════════════════════════════════════════

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: keycloak
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak # ← shared PG
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_secret
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8180
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./auth/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8180:8180"
      - "9010:9000"
    depends_on:
      postgres:
        condition: service_healthy # ← depends on shared PG
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r

            Host: localhost\r

            Connection: close\r

            \r

            ' >&3 && timeout 1 cat <&3 | grep -q '200 OK'"
        ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - clinical-net

  # ═══════════════════════════════════════════════════════════════
  # OpenFGA — Fine-Grained Authorization
  # ═══════════════════════════════════════════════════════════════
  openfga-migrate:
    image: openfga/openfga:v1.8.2
    container_name: openfga-migrate
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://openfga:openfga_secret@postgres:5432/openfga?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clinical-net

  openfga:
    image: openfga/openfga:v1.8.2
    container_name: openfga
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://openfga:openfga_secret@postgres:5432/openfga?sslmode=disable"
      OPENFGA_PLAYGROUND_ENABLED: "true"
      OPENFGA_HTTP_ADDR: "0.0.0.0:8080"
      OPENFGA_GRPC_ADDR: "0.0.0.0:8081"
      OPENFGA_LOG_LEVEL: info
    ports:
      - "8082:8080"
      - "8083:8081"
      - "3000:3000"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "/usr/local/bin/grpc_health_probe", "-addr=:8081" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clinical-net

  openfga-init:
    image: python:3.12-slim
    container_name: openfga-init
    restart: "no"
    command: >
      bash -c "pip install --quiet httpx &&
               python /app/init_store.py"
    volumes:
      - ./auth/openfga:/app:ro
    environment:
      OPENFGA_API_URL: "http://openfga:8080"
    depends_on:
      openfga:
        condition: service_healthy
    networks:
      - clinical-net

  # ═══════════════════════════════════════════════════════════════
  # API GATEWAY — FastAPI
  # ═══════════════════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      - KEYCLOAK_URL=http://keycloak:8180
      - KEYCLOAK_REALM=clinical-trials
      - KEYCLOAK_CLIENT_ID=research-platform-api
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-research-platform-secret}
      - KEYCLOAK_MCP_CLIENT_ID=${KEYCLOAK_MCP_CLIENT_ID:-research-platform-api}
      - KEYCLOAK_MCP_CLIENT_SECRET=${KEYCLOAK_MCP_CLIENT_SECRET:-research-platform-secret}
      - OPENFGA_API_URL=http://openfga:8080
      - OPENFGA_STORE_ID=${OPENFGA_STORE_ID:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=clinical_trials
      - POSTGRES_USER=ctuser
      - POSTGRES_PASSWORD=ctpassword
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpassword
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MCP_SERVER_URL=${MCP_SERVER_URL}
      - MCP_BEARER_TOKEN=${MCP_BEARER_TOKEN}
      - DATABASE_URL=postgresql://ctuser:ctpassword@postgres:5432/clinical_trials
      - ENABLE_TRACING=false # set true if Phoenix is running
      - PHOENIX_ENDPOINT=http://phoenix:6006/v1/traces
    depends_on:
      migrate:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
      openfga:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared:ro
      - ./auth:/app/auth:ro
    networks:
      - clinical-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3001:3001"
    depends_on:
      - api
    networks:
      - clinical-net
    # ── MCP Server (Clinical Trial Data Tools) ──────────────────────────
  mcp-server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: mcp-server
    environment:
      - DATABASE_URL=postgresql://ctuser:ctpassword@postgres:5432/clinical_trials
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpassword
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MCP_BEARER_TOKEN=${MCP_BEARER_TOKEN}
      - MCP_PORT=8001
      - EMBEDDING_MODEL=text-embedding-3-large
      - EMBEDDING_DIM=3072
      - KEYCLOAK_URL=http://keycloak:8180
      - KEYCLOAK_REALM=clinical-trials
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - clinical-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    # NOT exposed to host — only accessible within Docker network
    # Uncomment for debugging:
    ports:
      - "8001:8001"
# Add to existing volumes section:
volumes:
  zookeeper-data:
  kafka-data:
  postgres_data:
  qdrant-data:
  neo4jdata:
  minio-data:


networks:
  clinical-net:
    driver: bridge
